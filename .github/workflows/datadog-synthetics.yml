name: Run Datadog Synthetic tests

# متى يتم تشغيل الـ workflow
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  # إجبار كل Actions على Node.js 24 (حل المشكلة)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  
  # متغيرات إضافية للتوافق
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  synthetic-tests:
    runs-on: ubuntu-latest

    steps:
      # Checkout الكود - استخدام أحدث إصدار يدعم Node.js 24
      - name: Checkout repository
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 1

      # إعداد Node.js 24 (الأحدث)
      - name: Setup Node.js
        uses: actions/setup-node@v4.2.0
        with:
          node-version: '24.x'
          cache: 'npm'
          check-latest: true

      # التحقق من الإصدارات
      - name: Verify Node.js version
        run: node --version

      # تثبيت dependencies (إذا كان هناك package.json)
      - name: Install dependencies
        run: |
          if [ -f package.json ]; then
            echo "📦 Installing npm dependencies..."
            npm ci || npm install
          else
            echo "📭 No package.json found, skipping npm install"
          fi

      # Run Datadog Synthetic tests - استخدام v3 (يدعم Node.js 24)
      - name: Run Datadog Synthetic tests
        uses: DataDog/synthetics-ci-github-action@v3.0.0
        with:
          api_key: ${{ secrets.DD_API_KEY }}
          app_key: ${{ secrets.DD_APP_KEY }}
          test_search_query: 'tag:e2e-tests'
          # خيارات إضافية مفيدة:
          # files: 'synthetics/**/*.synthetics.json'
          # variables: 'ENVIRONMENT=production,TEST_USER=test-user'
          # timeout: 30
          # public_ids: ${{ vars.DD_SYNTHETICS_TESTS }}
        env:
          # تأكيد استخدام Node.js 24 لهذه الخطوة
          NODE_OPTIONS: '--max-old-space-size=4096'

      # خطوة إضافية: عرض حالة الاختبارات
      - name: Test Summary
        if: always()
        run: |
          echo "======================================"
          echo "✅ Datadog Synthetic tests completed"
          echo "📊 Check detailed results in Datadog dashboard"
          echo "⏱️  Run time: $(date)"
          echo "======================================"
