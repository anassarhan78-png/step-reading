<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STEP Reading - تعلم القراءة بالإنجليزية</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>📚 STEP Reading</h1>
        <p>تطوير مهارات القراءة للإختبار التحصيلي STEP</p>
    </header>
    
    <main>
        <div class="levels-grid">
            <div class="level-card" data-level="a1">
                <h2>A1 - مبتدئ</h2>
                <p>20 قطعة قراءة للمستوى المبتدئ</p>
                <a href="levels.html?level=a1" class="btn">ابدأ الآن</a>
            </div>
            
            <div class="level-card" data-level="a2">
                <h2>A2 - أساسي</h2>
                <p>20 قطعة قراءة للمستوى الأساسي</p>
                <a href="levels.html?level=a2" class="btn">ابدأ الآن</a>
            </div>
            
            <div class="level-card" data-level="b1">
                <h2>B1 - متوسط</h2>
                <p>20 قطعة قراءة للمستوى المتوسط</p>
                <a href="levels.html?level=b1" class="btn">ابدأ الآن</a>
            </div>
            
            <div class="level-card" data-level="step">
                <h2>🎯 STEP</h2>
                <p>25 قطعة قراءة بمستوى الإختبار</p>
                <a href="levels.html?level=step" class="btn">ابدأ الآن</a>
            </div>
        </div>
    </main>
    
    <script src="js/main.js"></script>
</body>
</html>
